<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col">
                <div class="card shadow p-4 mx-auto" style="max-width: 550px;">
                <h1>Formulario de Registro</h1>
                    <form action="form.html" method="post">

                        <!--Nombre-->
                        <div class="mb-3">
                            <label for="txtnombre" class="form-label">Nombre Completo</label>
                            <input type="text" class="form-control" id="txtnombre" name="txtnombre" placeholder="Ej. Jeno Lee">
                        </div>

                        <!--Teléfono-->
                        <div class="mb-3">
                            <label for="txttel" class="form-label">Núm. de Teléfono:</label>
                            <input type="tel" class="form-control" id="txttel" name="txttel" required
                            pattern="[0-9] {10}"
                            placeholder="10 dígitos (Ej.1272320003)">
                        </div>
                        
                        <!--Correo-->
                        <div class="mb-3">
                            <label for="textmail" class="form-label">Dirección de correo:</label>
                            <div class="input-group">
                            <span class="input-group-text">@</span>
                            <input type="email" class="form-control" id="txtmail" name="txtmail"
                                placeholder="correodejeno@nct.com">
                            </div>
                        </div>

                        <!--Contraseña-->
                        <div class="mb-3">
                            <label for="txtpass" class="form-label">Ingrese una Contraseña</label>
                            <input type="password" class="form-control" id="txtpass" name="txtpass"
                            placeholder="Mínimo 8 caracteres" required>
                            </div>

                        <!--Repetir contraseña-->
                        <div class="mb-3">
                            <label for="txtpass" class="form-label">Ingrese una Contraseña</label>
                            <input type="password" class="form-control" id="txtpass" name="txtpass"
                            placeholder="Repite tu Contraseña" required>
                        </div>

                        <!--Fecha de nacimiento-->
                        <div class="mb-3">
                            <label for="fecha-nac" class="form-label">Selecciona tu fecha de nacimiento</label>
                            <input type="date" class="form-control" id="fecha-nac" name="fecha-nac">
                        </div>

                        <!--Género hombre-->
                        <p>Género:</p>
                        <div class="form-check">
                            <input type="radio" class="form-check-input" name="genero" id="hombre" value="hombre">
                            <label for="hombre" class="form-check-label" >Hombre</label>
                        </div>

                        <!--Género mujer-->
                        <div class="mb-1">
                            <input type="radio" class="form-check-input" name="genero" id="hombre" value="hombre">
                            <label for="hombre" class="form-check-label">Mujer</label> 
                        </div>

                        <!--Género otro-->
                        <div class="mb-1">
                            <input type="radio" class="form-check-input" name="genero" id="hombre" value="hombre">
                            <label for="hombre" class="form-check-label">Otro</label>
                        </div>
                        </div>

                        <!--Términos-->
                        <div class="form-check mt-3 mb-3">
                            <input type="checkbox" id="terminos" name="terminos" required>
                            <label for="terminos">Acepto los términos y condiciones</label>
                        </div>

                        <!--Boton-->
                        <div class="mb-3">
                            <input type="submit" class="btn btn-primary btn-lg" value="Registrar">



    
    </form>
</body>
    </div>
        </div>
            </div>
                </div>
                    </div>
                     <!-- Link Regresar a Inicio -->
<a class="btn btn-info position-fixed bottom-0 end-0 m-5" href="index.html">

    </svg>
    Regresar a inicio
</a>
</html>
